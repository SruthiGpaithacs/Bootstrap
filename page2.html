<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Clearwave</title>
  
  <!-- Bootstrap 5.3.3 -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  
  <!-- Inter Font -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg: #f7fafc;
      --text-dark: #0f172a;
      --text-muted: #64748b;
      --green-1: #10b981;
      --green-2: #14b8a6;
      --phone-border: #1e293b;
    }

    body {
      background: var(--bg);
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      overflow-x: hidden;
    }

    .hero {
      min-height: 100vh;
      padding: 120px 0 100px;
      display: flex;
      align-items: center;
    }

    .hero h1 {
      font-size: 3.75rem;
      font-weight: 800;
      color: var(--text-dark);
      line-height: 1.1;
      letter-spacing: -0.03em;
      margin-bottom: 1.5rem;
    }

    .hero h1 .gradient {
      font-style: italic;
      font-weight: 700;
      background: linear-gradient(90deg, var(--green-1) 0%, var(--green-2) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .hero p {
      font-size: 1.125rem;
      color: var(--text-muted);
      line-height: 1.7;
      max-width: 580px;
      margin: 0 auto 4rem;
    }

    /* Phone mockup container */
    .phones {
      position: relative;
      height: 640px;
      perspective: 1200px;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .phone {
      position: absolute;
      height: 560px;
      width: auto;
      border-radius: 46px;
      border: 10px solid var(--phone-border);
      background: #000;
      box-shadow: 0 35px 80px rgba(15, 23, 42, 0.15);
      transition: all 0.4s cubic-bezier(0.25, 0.8, 0.25, 1);
      object-fit: cover;
    }

    /* Exact positioning like your screenshot */
    .phone:nth-child(1) {
      transform: translateX(-340px) rotateY(18deg) rotateZ(-6deg);
      z-index: 1;
      opacity: 0.8;
    }

    .phone:nth-child(2) {
      transform: translateX(-170px) rotateY(12deg) rotateZ(-3deg);
      z-index: 2;
      opacity: 0.9;
    }

    .phone:nth-child(3) {
      transform: translateZ(30px) scale(1.06);
      z-index: 5;
      height: 600px;
      border-color: #0a0f1c;
    }

    .phone:nth-child(4) {
      transform: translateX(170px) rotateY(-12deg) rotateZ(3deg);
      z-index: 2;
      opacity: 0.9;
    }

    .phone:nth-child(5) {
      transform: translateX(340px) rotateY(-18deg) rotateZ(6deg);
      z-index: 1;
      opacity: 0.8;
    }

    .phone:hover {
      z-index: 10 !important;
      transform: translateZ(50px) scale(1.1) rotateY(0) rotateZ(0) !important;
      opacity: 1 !important;
      box-shadow: 0 50px 100px rgba(15, 23, 42, 0.25);
    }

    @media (max-width: 1200px) {
      .hero h1 { font-size: 3rem; }
      .phones { height: 520px; }
      .phone { height: 440px; }
      .phone:nth-child(3) { height: 480px; }
      .phone:nth-child(1) { transform: translateX(-260px) rotateY(18deg) rotateZ(-6deg); }
      .phone:nth-child(2) { transform: translateX(-130px) rotateY(12deg) rotateZ(-3deg); }
      .phone:nth-child(4) { transform: translateX(130px) rotateY(-12deg) rotateZ(3deg); }
      .phone:nth-child(5) { transform: translateX(260px) rotateY(-18deg) rotateZ(6deg); }
    }


    @media (max-width: 768px) {
      .hero { padding: 80px 0 60px; min-height: auto; }
      .hero h1 { font-size: 2.25rem; letter-spacing: -0.02em; }
      .hero p { font-size: 1rem; margin-bottom: 3rem; }
      .phones { display: none; }
      .phones-mobile {
        display: flex !important;
        flex-direction: column;
        gap: 2rem;
        align-items: center;
      }
      .phones-mobile .phone {
        position: static;
        transform: none !important;
        height: 500px;
        border-width: 8px;
      }
    }

    .phones-mobile { display: none; }
  </style>
</head>
<body>

  <section class="hero">
    <div class="container">
      
      <div class="text-center">
        <h1>
          Your workspace,<br>
          <span class="gradient">in your pocket</span>
        </h1>
        
        <p>
          The Clearwave mobile app brings every dashboard, task, and <br class="d-none d-md-block">
          notification to you — beautifully adapted for any screen.
        </p>
      </div>

      <!-- Desktop: 5 Phones with 3D cascade -->
      <div class="phones">
        <!-- Put your 5 screenshots here. Name them phone1.png to phone5.png -->
        <img src="tm-622-screen-02.png" class="phone" alt="Dashboard screen">
        <img src="images/phone2.png" class="phone" alt="Login screen">
        <img src="images/phone3.png" class="phone" alt="Settings screen">
        <img src="images/phone4.png" class="phone" alt="Analytics screen">
        <img src="images/phone5.png" class="phone" alt="Overview screen">
      </div>

      <!-- Mobile: Stacked vertically -->
      <div class="phones-mobile">
        <img src="images/tm-622-screen-02.png" class="phone" alt="Dashboard screen">
        <img src="images/phone2.png" class="phone" alt="Login screen">
        <img src="images/phone3.png" class="phone" alt="Settings screen">
        <img src="images/phone4.png" class="phone" alt="Analytics screen">
        <img src="images/phone5.png" class="phone" alt="Overview screen">
      </div>

    </div>
  </section>

  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
